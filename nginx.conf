events {
    worker_connections 1024;
}

http {
    upstream mcp_backend {
        server mcp-server:8000;
    }

    # Rate limiting – 20 req/s per IP, burst up to 40
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    server {
        listen 80;
        server_name _;

        # ── Security headers ─────────────────────────────────────────────
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ── CORS – allow Claude / Cowork origins ─────────────────────────
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Mcp-Session-Id, Authorization, X-API-Key" always;

        # ── Health check (no auth, no rate limit) ────────────────────────
        location = /health {
            proxy_pass http://mcp_backend/health;
            access_log off;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # ── All MCP traffic ──────────────────────────────────────────────
        location / {
            # Preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Mcp-Session-Id, Authorization, X-API-Key" always;
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }

            # Rate limiting
            limit_req zone=api burst=40 nodelay;

            proxy_pass http://mcp_backend;
            proxy_http_version 1.1;

            # Pass all headers including auth
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-API-Key $http_x_api_key;

            # SSE / streaming support
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            # Generous timeouts for long-running MCP calls
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
    }
}
